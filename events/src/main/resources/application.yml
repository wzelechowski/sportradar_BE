spring:
  application:
    name: events
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
      hibernate.use_sql_comments: true
  datasource:
    url: jdbc:postgresql://localhost:15432/sportradar_db
    username: postgres
    password: password

server:
  servlet:
    context-path: /api/v1
  port: 8080
