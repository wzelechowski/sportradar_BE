spring:
  application:
    name: events
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
      hibernate.use_sql_comments: true
  datasource:
    url: jdbc:postgresql://sportradar_postgres:5432/sportradar_db
    username: postgres
    password: password
  data:
    web:
      pageable:
        serialization-mode: via_dto

server:
  servlet:
    context-path: /api/v1
  port: 8080
